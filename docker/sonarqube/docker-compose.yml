# Self-hosted SonarQube Community Build for the LAN (free, OSS).
# Community Build analyses the MAIN branch only (no PR decoration) — fine for an on-prem,
# confidentiality-sensitive project where code must not leave the network.
#
# Host prerequisite (Linux), otherwise the embedded Elasticsearch refuses to start:
#   sudo sysctl -w vm.max_map_count=524288
#   sudo sysctl -w fs.file-max=131072
#
# Pin `image:` to a verified tag/digest from Docker Hub at deploy time.

services:
  sonarqube:
    image: sonarqube:community
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonarqube
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD:?set SONAR_DB_PASSWORD}
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
    stop_grace_period: 3600s

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sonarqube
      POSTGRES_USER: sonarqube
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD:?set SONAR_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  postgres_data:
