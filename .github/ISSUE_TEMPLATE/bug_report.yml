name: Bug report
description: Something is not working as expected
labels: ["type:bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Core (floor control / hierarchy)
        - Messaging (NATS)
        - Audio / codec
        - Media service
        - Client (Avalonia)
        - Agent (daemon)
        - Manager (Blazor)
        - CI / build
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / runtime
      placeholder: Windows 11 / Ubuntu 24.04, .NET 10.0.x
    validations:
      required: true
