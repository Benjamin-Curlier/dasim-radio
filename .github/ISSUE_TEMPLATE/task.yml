name: Task
description: A unit of implementation work
labels: ["type:task"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should exist when this is done?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] tests added
        - [ ] build green
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes / dependencies
