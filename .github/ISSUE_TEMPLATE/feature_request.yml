name: Feature request
description: Propose a new capability or change
labels: ["type:feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What need does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: impact
    attributes:
      label: Architecture impact
      description: Does this touch the floor-control rules, the two-plane model, or a host boundary?
