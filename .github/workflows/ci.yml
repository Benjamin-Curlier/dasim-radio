name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore Dasim.Radio.slnx
      - name: Build
        run: dotnet build Dasim.Radio.slnx -c Release --no-restore
      # Unit tests run on both OSes. The Testcontainers/NATS integration tests need a Linux Docker
      # daemon, which the Windows runner lacks — there they intermittently hang the whole run — so they
      # run on Linux only, below.
      - name: Test (unit)
        run: dotnet test Dasim.Radio.slnx -c Release --no-build --filter "FullyQualifiedName!~Integration" --logger "trx;LogFileName=test-results.trx"
      - name: Test (integration, Linux only)
        if: runner.os == 'Linux'
        run: dotnet test tests/Dasim.Radio.Integration.Tests/Dasim.Radio.Integration.Tests.csproj -c Release --no-build --logger "trx;LogFileName=integration-results.trx"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: '**/TestResults/*.trx'
          if-no-files-found: ignore

  sonar:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    needs: build-test
    # Advisory (not a required merge gate). Cap it so a hung analyze/upload fails in minutes rather
    # than burning the full 6-hour job ceiling, as happened on PR #33.
    timeout-minutes: 15
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner
      - name: Analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN not configured — skipping SonarCloud analysis."
            exit 0
          fi
          dotnet sonarscanner begin \
            /k:"$SONAR_PROJECT_KEY" \
            /o:"$SONAR_ORGANIZATION" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" \
            /d:sonar.coverage.exclusions="**/Dasim.Radio.Audio.Benchmarks/**,**/Program.cs,**/Dasim.Radio.Client.Ptt/**,**/Dasim.Radio.Client.Audio.OwnAudio/**,**/Dasim.Radio.Client.App/**,**/Dasim.Radio.Manager/**,**/tools/**" \
            /d:sonar.scanner.scanAll=false
          dotnet build Dasim.Radio.slnx -c Release
          dotnet test Dasim.Radio.slnx -c Release --no-build \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=./TestResults/coverage.opencover.xml
          dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
